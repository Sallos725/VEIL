services:
  veil-sidecar:
    build:
      context: ..
      dockerfile: full/sidecar/Dockerfile
    container_name: veil-sidecar
    ports:
      - "6010:6010"
    environment:
      VEIL_PORT: "6010"
      VEIL_HOST: "0.0.0.0"
      VEIL_DATA_DIR: "/app/data"
      VEIL_LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      VEIL_LLM_MODEL: "llama3.2"
    volumes:
      - veil-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:6010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  veil-data:
